name: CI

on:
  push:
    branches: [main]
  pull_request:

# e2e omitted from CI — runs locally via `pnpm e2e` before merge.
# Playwright in CI would add ~3min and chromium download cost without
# enough marginal safety for a solo personal project.

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: 'pnpm'

      - run: pnpm install --frozen-lockfile

      - run: pnpm typecheck

      - run: pnpm lint

      - run: pnpm test

      - run: pnpm build

      - run: pnpm --filter @streak/web exec knip
